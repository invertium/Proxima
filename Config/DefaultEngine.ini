[/Script/LinuxTargetPlatform.LinuxTargetSettings]
; Ship BOTH feature levels. Cooking SM6 alone (which is what dropping the engine-default SM5
; did) leaves nothing for a GPU/driver that can't do SM6 to run, and it dies at startup with
; "Vulkan device could not be created at the project's supported feature levels". SM6 is still
; preferred where available; SM5 is the fallback that keeps older hardware booting.
+TargetedRHIs=SF_VULKAN_SM5
+TargetedRHIs=SF_VULKAN_SM6

