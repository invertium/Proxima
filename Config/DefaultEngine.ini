[/Script/Engine.RendererSettings]
r.AllowStaticLighting=False

[SystemSettings]
; Turning the view fast used to hitch: an off-screen mesh/material rotating into the
; frustum had its graphics pipeline (PSO) compiled inline on the render thread the first
; time it drew. Precache PSOs at load, and defer a mesh's first draw until its PSO is
; ready (a frame-late pop-in) instead of stalling the frame to build it.
r.PSOPrecaching=1
r.PSOPrecache.Components=1
r.PSOPrecache.Resources=1
r.PSOPrecache.ProxyCreationWhenPSOReady=1

